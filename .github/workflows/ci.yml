name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build / knip / test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
        # Native Windows is explicitly OUT OF SCOPE for v0.x (#137 decision;
        # see README "Windows note"): the CLI / hooks / tests assume POSIX,
        # and WSL2 is the supported path on Windows. windows-latest was
        # trialled in PR #114 (OPS-3) — 80+ tests fail on path-sep / EPERM /
        # package-manager detection. Re-add only if native support becomes a
        # goal.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm knip

      # Unit suite runs with v8 coverage so the job log carries a
      # text summary; lcov / html artefacts stay on disk for future
      # Codecov-style hookup (tracked separately).
      - run: pnpm test:coverage

      - run: pnpm test:e2e

      # Guard against README's embedded tag-zero demo (docs/demo/tag-zero.cast
      # -> tag-zero.svg, see scripts/record-tag-zero-demo.mjs) silently going
      # stale relative to what the built CLI actually outputs.
      #
      # A byte-for-byte `git diff --exit-code` on the regenerated .cast is
      # NOT used here because it would be flaky: `impact()`'s affectedFiles
      # ordering is explicitly undocumented/unguaranteed (see the
      # "Order-independent assertion" comment in
      # tests/e2e/tag-zero.e2e.test.ts), and re-running `pnpm demo:record`
      # locally back-to-back was observed to also vary the recorded event
      # count by one (an incidental blank flush event) independent of any
      # real content change. Both would make an exact-match gate red on
      # harmless noise, not just genuine drift.
      #
      # Instead: (1) hard-fail if the freshly regenerated cast is missing the
      # load-bearing strings the demo promises (catches real CLI/output
      # drift), and (2) soft-report (non-blocking) any diff against the
      # committed file so a human notices a regen is due.
      - run: pnpm demo:record

      - name: Verify tag-zero demo cast still shows the promised output
        run: |
          for needle in "Zero-tag ready" "artgraph impact --diff" "src/a.ts" "Affected Files:"; do
            grep -qF "$needle" docs/demo/tag-zero.cast || {
              echo "::error::docs/demo/tag-zero.cast no longer contains '$needle' — CLI output has drifted; regenerate with 'pnpm demo' and commit docs/demo/tag-zero.{cast,svg}"
              exit 1
            }
          done

      # Advisory only (see rationale above): impact()'s file ordering isn't
      # guaranteed, so this can go red on harmless reordering as well as real
      # drift. Flip to a hard failure once the recorder's output is made
      # fully deterministic.
      - name: Check committed tag-zero.cast is up to date (advisory)
        run: git diff --exit-code -- docs/demo/tag-zero.cast
        continue-on-error: true

      # Perf budgets are wall-clock sensitive — run separately so a
      # CPU-contended runner spike fails the perf step without obscuring
      # unit/e2e signal, and so a perf flake doesn't block PR merges.
      # `continue-on-error: true` reports the failure visibly in the job
      # summary without failing the workflow; flip to `false` once the
      # CI baseline for SC-004 wall-clock is established.
      - run: pnpm test:perf
        continue-on-error: true

  # spec 022 (tasks.md T024, FR-014 — analysis finding C2: "3.x/4.x を実際に
  # 回すマトリクスは現状存在しない"): the `build` job above always installs
  # whatever `pnpm-lock.yaml` pins (currently vitest 4.x) — nothing actually
  # exercises the OTHER end of this project's own declared peer range
  # (`peerDependencies.vitest: ">=3 <5"`). This job swaps vitest down to 3.x
  # for itself only (lockfile untouched — see the `--no-lockfile` step
  # below) and reruns the runner/parity e2e suite, which covers both trace
  # engines (`instrument`/`cdp`), against it.
  vitest-compat:
    name: vitest-compat (vitest@3.x e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `--no-lockfile` (not `--no-save` — this project's pinned pnpm
      # (`packageManager` in package.json) doesn't expose a `--no-save` flag
      # on `add`) swaps `node_modules` to vitest 3.x for this job's
      # `package.json`/`node_modules` only, without writing back to the
      # committed `pnpm-lock.yaml` (verified locally: `git diff
      # pnpm-lock.yaml` is empty after this step).
      - run: pnpm add -D vitest@^3 @vitest/coverage-v8@^3 --no-lockfile

      - run: pnpm build

      # Deliberately NOT `continue-on-error: true` (tasks.md T024) — a
      # vitest-3.x incompatibility must show up as a red job, not be
      # swallowed silently.
      - run: >-
          pnpm vitest run --config vitest.e2e.config.ts
          tests/e2e/vitest-runner.e2e.test.ts
          tests/e2e/engine-parity.e2e.test.ts

  # Package-manager smoke matrix (spec 015, FR-015/016/017, SC-006): prove the
  # CLI runs init -> scan -> check under every supported PM runner, including
  # ts-morph under the Bun and Deno runtimes. Deno runs the built ./dist/cli.js
  # directly because artgraph is not published yet (research R4).
  pm-smoke:
    name: pm-smoke (${{ matrix.pm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pm: [npm, pnpm, bun, deno]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: pnpm

      - if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin to the 1.3.x line the SC-006 research was validated against;
          # patch updates are still picked up automatically.
          bun-version: 1.3.x

      - if: matrix.pm == 'deno'
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          # Pin to the 2.9.x line the SC-006 research was validated against;
          # patch updates are still picked up automatically.
          deno-version: v2.9.x

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: bash scripts/pm-smoke.sh ${{ matrix.pm }}

  # spec 013 SC-007 scope-out regression guard (#144): the cross-agent
  # extensions spec promises NO MCP server implementation, NO plugin
  # marketplace manifests, NO non-Claude agent hooks. PR #114 T034 ran this
  # as a one-off grep; this job makes it a standing tree-wide guard.
  # specs/013-cross-agent-extensions/ is excluded — its research/spec docs
  # legitimately quote the forbidden terms.
  scope-guard:
    name: scope-guard (SC-007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: SC-007 scope-out regression guard
        run: |
          FORBIDDEN='(mcp[-_]server|\.claude-plugin|\.codex-plugin|\.cursor-plugin|\.codex/hooks|\.cursor/hooks|kiro.*hook)'
          # Review H1: split the `git ls-files` call from the `grep` so a
          # `ls-files` failure isn't swallowed by grep's `|| true` (which is
          # only meant to tolerate grep's own "no match" exit code 1) — with
          # `set -e` (the default for `run:` steps), a failing assignment
          # line now fails the job instead of silently treating "ls-files
          # broke" the same as "no forbidden files found".
          FILES=$(git ls-files ':!specs/013-cross-agent-extensions/**')
          # Review H2: case-insensitive, so e.g. `MCP-Server`/`Kiro...Hook`
          # can't slip past the guard on casing alone.
          MATCHES=$(printf '%s\n' "$FILES" | grep -iE "$FORBIDDEN" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::SC-007 violation — files matching MCP / plugin-manifest / non-Claude hook patterns:"
            echo "$MATCHES"
            exit 1
          fi
          echo "SC-007 OK"
