name: Feature request
description: 新機能や挙動の改善を提案する
title: "[feat] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: いま何が困っていますか?どんな場面で詰まりますか?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案
      description: どんな機能・挙動・API があると解決しますか?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: ワークアラウンドや他ツールでの解決方法など
  - type: textarea
    id: additional
    attributes:
      label: 補足
      description: 関連 issue、参考実装、想定ユースケースなど
